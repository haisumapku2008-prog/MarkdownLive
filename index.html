<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MarkdownLive Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; }
        textarea, #preview { width: 50%; height: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        textarea { border: none; border-right: 1px solid #ccc; outline: none; background: #f4f4f4; resize: none; font-family: monospace; font-size: 14px; }
        #preview { background: white; }
    </style>
</head>
<body>
    <textarea id="editor" placeholder="Type Markdown here..."></textarea>
    <div id="preview"></div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');

        editor.addEventListener('input', () => {
            const raw = editor.value;
            preview.innerHTML = marked.parse(raw);
        });
    </script>
</body>
</html>
